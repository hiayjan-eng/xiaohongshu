<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>收藏复活扫描</title>
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body>
    <main class="popup-shell">
      <header>
        <span class="brand-dot">复</span>
        <div>
          <strong>旧收藏扫描 Beta</strong>
          <small>只扫描当前已加载页面</small>
        </div>
      </header>

      <section class="notice">
        <strong>使用边界</strong>
        <p>请先打开你本人已登录的小红书网页版收藏夹。Beta 只读取当前页面 DOM 中已加载出来的卡片，导入前你可以先勾选确认。</p>
      </section>

      <section id="pageHealth" class="page-health">等待检测当前标签页</section>

      <label class="field">
        <span>导入到 Web 地址</span>
        <input id="webAppUrl" placeholder="https://xiaohongshu-green.vercel.app/old-import" />
      </label>

      <div class="actions">
        <button id="scanVisible" class="primary">扫描当前可见卡片</button>
        <button id="scanScroll" class="secondary">轻滚动后扫描</button>
      </div>

      <div id="status" class="status">等待扫描</div>

      <section class="stats" id="statsGrid" aria-label="扫描统计">
        <span><strong>0</strong><small>总数</small></span>
        <span><strong>0</strong><small>有链接</small></span>
        <span><strong>0</strong><small>重复</small></span>
        <span><strong>0</strong><small>缺标题</small></span>
      </section>

      <section class="results">
        <div class="results-head">
          <strong>待导入清单</strong>
          <span id="count">0 条</span>
        </div>
        <div class="select-actions">
          <button id="selectAll" class="link-button" disabled>全选</button>
          <button id="clearSelection" class="link-button" disabled>取消全选</button>
        </div>
        <div id="list" class="result-list"></div>
      </section>

      <div class="actions bottom">
        <button id="importToWeb" class="primary" disabled>导入并查看结果</button>
        <button id="exportJson" class="secondary" disabled>导出 JSON</button>
      </div>
    </main>
    <script src="./popup.js"></script>
  </body>
</html>
